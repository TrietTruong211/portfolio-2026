name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test-api:
    name: API — typecheck & test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Tests
        run: npm test
        env:
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          NODE_ENV: test

  deploy-web:
    name: Build & Deploy Web → S3 + CloudFront (Prod)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build (production static export)
        run: npm run build:prod
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      - name: Terraform — apply CloudFront config
        working-directory: ${{ github.workspace }}/infra
        env:
          TF_VAR_api_origin_domain: ${{ vars.API_ORIGIN_URL }}
          TF_VAR_s3_bucket_regional_domain: ${{ vars.S3_BUCKET_REGIONAL_DOMAIN }}
          TF_VAR_s3_origin_id: ${{ vars.CLOUDFRONT_S3_ORIGIN_ID }}
          TF_VAR_s3_oac_id: ${{ vars.CLOUDFRONT_OAC_ID }}
          TF_VAR_web_acl_id: ${{ vars.WAF_WEB_ACL_ARN }}
          TF_VAR_acm_certificate_arn: ${{ vars.ACM_CERTIFICATE_ARN }}
          TF_VAR_domain_aliases: '["trietportfolio.site","www.trietportfolio.site"]'
        run: |
          terraform init
          terraform apply -auto-approve

      # Hashed assets (JS/CSS/fonts/images) — immutable, 1-year cache
      - name: Sync immutable assets to S3
        run: |
          aws s3 sync dist/web/browser s3://${{ vars.S3_BUCKET }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html" \
            --exclude "*.json"

      # HTML + JSON — always revalidate so users get fresh prerendered pages
      - name: Sync HTML and JSON to S3
        run: |
          aws s3 sync dist/web/browser s3://${{ vars.S3_BUCKET }} \
            --cache-control "public,max-age=0,must-revalidate" \
            --include "*.html" \
            --include "*.json"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
