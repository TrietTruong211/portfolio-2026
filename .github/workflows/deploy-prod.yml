name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test-api:
    name: API — typecheck & test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Tests
        run: npm test
        env:
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          NODE_ENV: test

  deploy-web:
    name: Build & Deploy Web → S3 + CloudFront (Prod)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build (production static export)
        run: npm run build:prod
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      # Ensures /auth/* and /api/* CloudFront behaviors route to the Railway API origin.
      # Idempotent — skips if the behaviors already exist.
      # Requires vars.API_ORIGIN_URL = portfolio-2026-production-61de.up.railway.app (no scheme).
      - name: Ensure CloudFront → Railway API behaviors
        env:
          DIST_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
          API_DOMAIN: ${{ vars.API_ORIGIN_URL }}
        run: |
          python3 - <<'EOF'
          import boto3, json, os, sys

          dist_id   = os.environ['DIST_ID']
          api_domain = os.environ['API_DOMAIN']
          origin_id  = 'railway-api'

          cf   = boto3.client('cloudfront')
          resp = cf.get_distribution_config(Id=dist_id)
          etag = resp['ETag']
          cfg  = resp['DistributionConfig']

          # --- origin ---
          origins = cfg['Origins']['Items']
          if not any(o['Id'] == origin_id for o in origins):
              origins.append({
                  'Id': origin_id,
                  'DomainName': api_domain,
                  'OriginPath': '',
                  'OriginCustomHeaders': {'Quantity': 0, 'Items': []},
                  'ConnectionAttempts': 3,
                  'ConnectionTimeout': 10,
                  'CustomOriginConfig': {
                      'HTTPSPort': 443,
                      'HTTPPort': 80,
                      'OriginProtocolPolicy': 'https-only',
                      'OriginSslProtocols': {'Quantity': 1, 'Items': ['TLSv1.2']},
                      'OriginReadTimeout': 30,
                      'OriginKeepaliveTimeout': 5,
                  },
              })
              cfg['Origins']['Quantity'] = len(origins)
              cfg['Origins']['Items']    = origins

          # --- behaviors ---
          behaviors     = cfg.setdefault('CacheBehaviors', {'Quantity': 0, 'Items': []})
          behaviors.setdefault('Items', [])
          existing_paths = {b['PathPattern'] for b in behaviors['Items']}
          changed = False

          for path in ['/auth/*', '/api/*']:
              if path in existing_paths:
                  continue
              behaviors['Items'].append({
                  'PathPattern': path,
                  'TargetOriginId': origin_id,
                  'ViewerProtocolPolicy': 'https-only',
                  'AllowedMethods': {
                      'Quantity': 7,
                      'Items': ['GET','HEAD','OPTIONS','PUT','PATCH','POST','DELETE'],
                      'CachedMethods': {'Quantity': 2, 'Items': ['GET','HEAD']},
                  },
                  'ForwardedValues': {
                      'QueryString': True,
                      'Cookies': {'Forward': 'all'},
                      'Headers': {'Quantity': 0, 'Items': []},
                      'QueryStringCacheKeys': {'Quantity': 0, 'Items': []},
                  },
                  'MinTTL': 0, 'DefaultTTL': 0, 'MaxTTL': 0,
                  'Compress': False,
                  'SmoothStreaming': False,
                  'FieldLevelEncryptionId': '',
                  'TrustedSigners': {'Enabled': False, 'Quantity': 0},
                  'TrustedKeyGroups': {'Enabled': False, 'Quantity': 0, 'Items': []},
                  'LambdaFunctionAssociations': {'Quantity': 0, 'Items': []},
                  'FunctionAssociations': {'Quantity': 0, 'Items': []},
              })
              changed = True

          if not changed:
              print('CloudFront behaviors already configured — nothing to do.')
              sys.exit(0)

          behaviors['Quantity'] = len(behaviors['Items'])
          cf.update_distribution(DistributionConfig=cfg, Id=dist_id, IfMatch=etag)
          print('CloudFront behaviors added successfully.')
          EOF

      # Hashed assets (JS/CSS/fonts/images) — immutable, 1-year cache
      - name: Sync immutable assets to S3
        run: |
          aws s3 sync dist/web/browser s3://${{ vars.S3_BUCKET }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html" \
            --exclude "*.json"

      # HTML + JSON — always revalidate so users get fresh prerendered pages
      - name: Sync HTML and JSON to S3
        run: |
          aws s3 sync dist/web/browser s3://${{ vars.S3_BUCKET }} \
            --cache-control "public,max-age=0,must-revalidate" \
            --include "*.html" \
            --include "*.json"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
